<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omkar | Personal Site</title>
    
    
    <link rel="icon" type="image/x-icon" href="spidey_no_bg.png">
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    
    <div class="video-background">
        <video autoplay loop muted playsinline preload="auto" id="bg-video">
            <source src="black-hole-dark-space-moewalls-com.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>
    
    
    <audio id="bg-audio" loop>
        <source src="web-song.mp3" type="audio/mpeg">
    </audio>

    
    <div id="particles-js"></div>

    
    <div class="ui-layer">
        
       
        <div class="audio-wrapper">
            <div class="audio-control">
                <i class="fa-solid fa-volume-xmark" id="audio-icon"></i>
            </div>
            <div class="volume-slider-container">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>

        
        <div class="view-counter">
            <i class="fa-solid fa-eye"></i>
            <span id="view-count">...</span>
        </div>

        
        <main class="content-wrapper">
            
            <div class="main-avatar-container">
                <img src="cat-omi.jpeg" alt="omi Profile" class="main-avatar">
            </div>
            
            <h1 class="main-name">Omi ちゃん</h1>

            
            <div class="status-card">
                <div class="status-avatar-container">
                    <img src="cat-omi.jpeg" alt="omi Profile" class="status-avatar">
                    <div class="status-indicator"></div>
                </div>
                <div class="status-info">
                    <div class="status-header">
                        <span class="status-name">Omi ちゃん</span>
                        <i class="fa-solid fa-circle-check status-badge"></i>
                    </div>
                    <span class="status-text"></span>
                </div>
            </div>

           
            <div class="social-links">
                <a href="http://www.youtube.com/@okayji555" class="social-icon" data-hover="Youtube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
                <a href="https://www.instagram.com/who_omkar_.not_me" class="social-icon" data-hover="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/in/omkargore555/" class="social-icon" data-hover="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://discord.com/users/844148826502594590" class="social-icon" data-hover="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
            </div>
        </main>
    </div>

   
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
